name: Reminder Scheduler

on:
  schedule:
    # GitHub Actions minimal interval is every 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: reminder-scheduler
  cancel-in-progress: false

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger reminder cron endpoint
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          BASE_URL="${APP_BASE_URL:-https://catat-wang.vercel.app}"
          URL="${BASE_URL%/}/api/cron/send-reminders"

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "CRON_SECRET is not configured in GitHub repository secrets."
            exit 1
          fi

          echo "Calling ${URL}"

          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$URL")"

          echo "HTTP ${HTTP_CODE}"
          cat "$RESPONSE_FILE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Reminder trigger failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          if ! grep -q '"success":true' "$RESPONSE_FILE"; then
            echo "Reminder trigger returned non-success payload."
            exit 1
          fi
