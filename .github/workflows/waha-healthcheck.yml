name: WAHA Healthcheck

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: waha-healthcheck
  cancel-in-progress: true

jobs:
  check-waha:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check WAHA session status
        env:
          WAHA_BASE_URL: ${{ vars.WAHA_BASE_URL }}
          WAHA_API_KEY: ${{ secrets.WAHA_API_KEY }}
          WAHA_SESSION_NAME: ${{ vars.WAHA_SESSION_NAME }}
        run: |
          set -euo pipefail

          BASE_URL="${WAHA_BASE_URL:-}"
          API_KEY="${WAHA_API_KEY:-}"
          SESSION="${WAHA_SESSION_NAME:-default}"

          if [ -z "$BASE_URL" ] || [ -z "$API_KEY" ]; then
            echo "WAHA_BASE_URL / WAHA_API_KEY belum dikonfigurasi di GitHub vars/secrets."
            exit 1
          fi

          URL="${BASE_URL%/}/api/sessions/${SESSION}"
          echo "Checking $URL"

          BODY_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS -o "$BODY_FILE" -w "%{http_code}" \
            -H "X-Api-Key: ${API_KEY}" \
            -H "Accept: application/json" \
            "$URL")"

          echo "HTTP $HTTP_CODE"
          cat "$BODY_FILE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "WAHA healthcheck failed: non-2xx."
            exit 1
          fi

          STATUS="$(python - <<'PY' "$BODY_FILE"
import json,sys
p=sys.argv[1]
with open(p,'r',encoding='utf-8') as f:
    data=json.load(f)
print(data.get('status',''))
PY
)"

          echo "Session status: $STATUS"
          if [ "$STATUS" != "WORKING" ]; then
            echo "WAHA healthcheck failed: status is not WORKING."
            exit 1
          fi

          echo "WAHA healthcheck OK"
